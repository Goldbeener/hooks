name: Build macOS

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app (Apple Silicon)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          CI: false
        run: pnpm tauri build --target aarch64-apple-darwin

      - name: Build Tauri app (Intel)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          CI: false
        run: pnpm tauri build --target x86_64-apple-darwin

      - name: Upload Apple Silicon build
        uses: actions/upload-artifact@v4
        with:
          name: hooks-macos-arm64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
          retention-days: 30

      - name: Upload Intel build
        uses: actions/upload-artifact@v4
        with:
          name: hooks-macos-x64
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app
          retention-days: 30
