name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: hooks-windows
            artifact-path: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: hooks-macos-arm64
            artifact-path: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact-name: hooks-macos-x64
            artifact-path: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          CI: false
        run: pnpm tauri build --target ${{ matrix.target }} --bundles app

      - name: Package macOS app as tar.gz
        if: runner.os == 'macOS'
        run: |
          APP_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle/macos -name "*.app" | head -1)
          APP_DIR=$(dirname "$APP_PATH")
          tar -czf "$APP_DIR/hooks-${{ matrix.target }}.tar.gz" -C "$APP_DIR" "$(basename "$APP_PATH")"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          retention-days: 30
