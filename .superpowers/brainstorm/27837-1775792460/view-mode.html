<h2>新"按天视图"模式的入口方式？</h2>
<p class="subtitle">它和现有的"文本 / JSON"格式切换是什么关系</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>独立的第三种视图模式</h3>
      <p>在页面顶部增加一个视图切换器，三种模式：<strong>列表视图</strong>（现有）/ <strong>按天视图</strong>（新增）/ 格式切换仅在列表视图里出现</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>复用现有切换位置</h3>
      <p>把原来的"文本 / JSON"开关替换为三档切换：<strong>文本</strong> / <strong>JSON</strong> / <strong>按天</strong>，三档共用同一个切换控件</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>单独的按钮</h3>
      <p>在页头右侧加一个"按天"图标按钮，点击进入按天视图，按天视图里有独立的"复制"按钮（含自己的格式选项）</p>
    </div>
  </div>
</div>
